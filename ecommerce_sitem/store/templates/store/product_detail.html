{% extends 'store/base.html' %}
{% block title %}Product Details - VerdanaFresh{% endblock %}
{% block content %}
    <h1>{{ product.name }}</h1>
    <p><strong>Price:</strong> ₹{{ product.price }}</p>
    <p>{{ product.description }}</p>
    {% if product.image %}
        <img src="{{ product.image.url }}" width="200px" alt="{{ product.name }}">
    {% endif %}
    <a href="{% url 'store:home' %}">Back to Home</a>
{% endblock %}
